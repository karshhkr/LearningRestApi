spring.application.name=LearningRestApi
server.port=8080
# context path is  URL prefix which automatically have before every API
server.servlet.context-path=/api
#mysql db  configuration

#data source url

spring.datasource.url=jdbc:mysql://localhost:3306/students_db
spring.datasource.username=root
spring.datasource.password=12345

#jpa Configuration to sql shown in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# for creating and updating table automatically schemas
spring.jpa.hibernate.ddl-auto=update

server.error.include-message=always
server.error.include-binding-errors=always